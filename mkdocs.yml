site_name: Microbots
site_url: https://microsoft.github.io/microbots
site_description: A lightweight, extensible AI agent for code comprehension and controlled file edits.
repo_url: https://github.com/microsoft/microbots
repo_name: microsoft/microbots

theme:
  name: zensical
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - attr_list

nav:
  - Getting Started:
    - Home: index.md
  - Guides:
    - CopilotBot: copilot-bot.md
    - Authentication: authentication.md
  - Blogs:
    - blog/index.md
    - "Microbots : Safety First Agentic Workflow": blog/microbots-safety-first-ai-agent.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/lightbox.js
