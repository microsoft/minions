name: sub_agent
tool_type: external
description: A sub-agent is a specialized agent designed to perform specific tasks or functions within a larger system. It operates autonomously to achieve its designated goals. It can be used to perform tasks like code modifications, refactoring or collecting information from the codebase.

usage_instructions_to_llm: |
  # Usage instructions for the sub-agent tool:
  # The sub-agent is an autonomous agent that can perform tasks such as code modifications, refactoring, or collecting information from the codebase.
  #
  # CLI syntax:
  #   sub_agent --repo_path <path> --permission <readonly|write> --task "<task description>"
  #
  # Arguments:
  #   --repo_path   : Absolute path to the repository directory to operate on.
  #   --permission  : "readonly" for read-only analysis tasks, "write" for code modification tasks.
  #   --task        : A detailed description of the task for the sub-agent to perform.
  #
  # Examples:
  #   sub_agent --repo_path /workdir/repo --permission readonly --task "Find the root cause of the failing test in tests/test_utils.py"
  #   sub_agent --repo_path /workdir/repo --permission write --task "Fix the syntax error in src/parser.py line 42"
  #
  # The sub-agent runs with a 20-minute timeout and a maximum of 50 iterations.
  # Exit code 0 on success; exit code -1 (255) on failure or timeout, with error details on stderr.

files_to_copy:
  - src: sub_agent/sub_agent.py
    dest: /sbin/sub_agent
    permissions: 7  # rwx

install_commands:
  - sudo apt install python3 python3-pip -y
  - sudo -H pip install microbots

verify_commands:
  - cat /sbin/sub_agent
  - sub_agent --version

env_variables:
  - AZURE_OPENAI_API_KEY
  - AZURE_OPENAI_ENDPOINT
  - AZURE_OPENAI_API_VERSION
  - AZURE_OPENAI_LLM

uninstall_commands:
  - sudo rm /sbin/sub_agent
  - sudo -H pip uninstall microbots -y