<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310">
  <rect width="800" height="310" fill="#010409"/>
  <rect x="1" y="1" width="798" height="308" fill="none" stroke="#3d444d" stroke-width="1"/>

  <!-- Agent command (dangerous) -->
  <rect x="40" y="45" width="145" height="42" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="112" y="63" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#e6edf3">Agent Command</text>
  <text x="112" y="79" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">rm -rf /</text>

  <!-- Arrow to validator -->
  <line x1="185" y1="66" x2="248" y2="66" stroke="#6e7681" stroke-width="1"/>
  <polygon points="246,61 256,66 246,71" fill="#6e7681"/>

  <!-- Safety Validator -->
  <rect x="260" y="30" width="240" height="72" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="380" y="54" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f85149">Safety Validator</text>
  <text x="380" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">scans against destructive patterns</text>
  <text x="380" y="88" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#3d444d">rm -rf | find -exec | chmod 777 | curl|bash</text>

  <!-- Blocked path down -->
  <line x1="340" y1="102" x2="340" y2="135" stroke="#f85149" stroke-width="1"/>
  <polygon points="334,133 340,143 346,133" fill="#f85149"/>

  <!-- Blocked result -->
  <rect x="230" y="148" width="220" height="58" rx="6" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <text x="340" y="168" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#f85149">Blocked</text>
  <text x="340" y="184" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">rm -rf / is destructive</text>
  <text x="340" y="198" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">reason sent back to agent</text>

  <!-- Self-correct loop -->
  <path d="M230 185 Q170 185 170 140 Q170 95 185 80" fill="none" stroke="#d29922" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="142" y="140" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#d29922">self-correct</text>

  <!-- Safe command -->
  <rect x="40" y="240" width="145" height="42" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="112" y="258" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#e6edf3">Agent (retry)</text>
  <text x="112" y="274" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">ls -la src/</text>

  <!-- Arrow passes -->
  <line x1="185" y1="261" x2="508" y2="261" stroke="#39d353" stroke-width="1"/>
  <polygon points="506,256 516,261 506,266" fill="#39d353"/>
  <text x="350" y="252" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#39d353">passes validation</text>

  <!-- Sandbox -->
  <rect x="520" y="238" width="200" height="46" rx="6" fill="#0d1117" stroke="#39d353" stroke-width="1"/>
  <text x="620" y="258" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#39d353">Executed in Sandbox</text>
  <text x="620" y="275" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">safe command proceeds</text>

  <!-- Pattern list -->
  <rect x="550" y="25" width="210" height="140" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="655" y="48" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Blocked Patterns</text>
  <line x1="560" y1="56" x2="750" y2="56" stroke="#3d444d" stroke-width="1"/>
  <g font-family="'SF Mono', monospace" font-size="9">
    <text x="570" y="75" fill="#f85149">&#x2715;</text><text x="588" y="75" fill="#9ca3af">rm -rf</text>
    <text x="570" y="93" fill="#f85149">&#x2715;</text><text x="588" y="93" fill="#9ca3af">find / -exec</text>
    <text x="570" y="111" fill="#f85149">&#x2715;</text><text x="588" y="111" fill="#9ca3af">ls -R / (unbounded)</text>
    <text x="570" y="129" fill="#f85149">&#x2715;</text><text x="588" y="129" fill="#9ca3af">chmod 777</text>
    <text x="570" y="147" fill="#f85149">&#x2715;</text><text x="588" y="147" fill="#9ca3af">curl | bash</text>
  </g>
</svg>
