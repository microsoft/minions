<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <rect width="800" height="280" fill="#010409"/>
  <rect x="1" y="1" width="798" height="278" fill="none" stroke="#3d444d" stroke-width="1"/>

  <!-- Parent Agent -->
  <rect x="50" y="30" width="155" height="55" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="127" y="52" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">AgentBoss</text>
  <text x="127" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">budget: 50 iterations</text>

  <!-- Total budget bar -->
  <rect x="250" y="42" width="500" height="22" rx="4" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <text x="500" y="57" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">Total Budget: 50 iterations</text>

  <!-- Lines down -->
  <line x1="127" y1="85" x2="127" y2="110" stroke="#3d444d" stroke-width="1"/>
  <line x1="127" y1="110" x2="160" y2="110" stroke="#3d444d" stroke-width="1"/>
  <line x1="127" y1="110" x2="450" y2="110" stroke="#3d444d" stroke-width="1"/>

  <!-- Sub-agent 1 -->
  <rect x="50" y="125" width="155" height="50" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="127" y="147" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">ReadingBot</text>
  <text x="127" y="164" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">used: 30 iterations</text>
  <!-- Bar -->
  <rect x="50" y="183" width="155" height="14" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <rect x="51" y="184" width="93" height="12" rx="2" fill="#d29922" opacity="0.5"/>
  <text x="127" y="194" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#9ca3af">30 / 50</text>

  <!-- Arrow -->
  <line x1="205" y1="155" x2="318" y2="155" stroke="#6e7681" stroke-width="1"/>
  <polygon points="316,150 326,155 316,160" fill="#6e7681"/>
  <text x="262" y="147" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#6e7681">-30</text>

  <!-- Sub-agent 2 -->
  <rect x="330" y="125" width="155" height="50" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="407" y="147" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">WritingBot</text>
  <text x="407" y="164" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">max: 20 remaining</text>
  <!-- Bar -->
  <rect x="330" y="183" width="155" height="14" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <rect x="331" y="184" width="62" height="12" rx="2" fill="#39d353" opacity="0.4"/>
  <text x="407" y="194" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#9ca3af">20 / 50</text>

  <!-- Blocked arrow -->
  <line x1="485" y1="155" x2="590" y2="155" stroke="#3d444d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="538" y="147" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#f85149">&#x2715;</text>

  <!-- Sub-agent 3 (blocked) -->
  <rect x="600" y="125" width="155" height="50" rx="6" fill="#151b23" stroke="#3d444d" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="677" y="147" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#6e7681">Sub-Agent 3</text>
  <text x="677" y="164" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#f85149">budget exhausted</text>
  <!-- Bar -->
  <rect x="600" y="183" width="155" height="14" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <text x="677" y="194" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#f85149">0 / 50</text>

  <!-- Bottom -->
  <rect x="150" y="225" width="500" height="36" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="400" y="241" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#d29922" font-weight="500">Sub-agents share the parent's iteration budget</text>
  <text x="400" y="255" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#6e7681">No infinite loops, no surprise API bills</text>
</svg>
