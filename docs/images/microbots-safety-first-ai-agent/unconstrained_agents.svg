<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <rect width="800" height="320" fill="#010409"/>
  <rect x="1" y="1" width="798" height="318" fill="none" stroke="#3d444d" stroke-width="1"/>

  <!-- Agent -->
  <rect x="60" y="110" width="140" height="64" rx="8" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="130" y="138" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">AI Agent</text>
  <text x="130" y="158" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#6e7681">rm -rf /project</text>

  <!-- Arrow -->
  <line x1="200" y1="142" x2="310" y2="142" stroke="#6e7681" stroke-width="1.2"/>
  <polygon points="308,137 318,142 308,147" fill="#6e7681"/>
  <text x="260" y="132" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#6e7681">direct access</text>

  <!-- Host Filesystem -->
  <rect x="330" y="80" width="190" height="124" rx="8" fill="#0d1117" stroke="#f85149" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="425" y="105" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Host Filesystem</text>
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#9ca3af">
    <rect x="348" y="115" width="60" height="20" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
    <text x="378" y="129" text-anchor="middle">src/</text>
    <rect x="418" y="115" width="60" height="20" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
    <text x="448" y="129" text-anchor="middle">keys/</text>
    <rect x="348" y="143" width="60" height="20" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
    <text x="378" y="157" text-anchor="middle">.env</text>
    <rect x="418" y="143" width="60" height="20" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
    <text x="448" y="157" text-anchor="middle">prod/</text>
    <rect x="348" y="171" width="60" height="20" rx="3" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
    <text x="378" y="185" text-anchor="middle">db.conf</text>
  </g>

  <!-- Damage arrow -->
  <line x1="520" y1="142" x2="580" y2="130" stroke="#3d444d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Damage indicator -->
  <circle cx="620" cy="120" r="32" fill="none" stroke="#f85149" stroke-width="1.5"/>
  <line x1="597" y1="97" x2="643" y2="143" stroke="#f85149" stroke-width="1.5"/>
  <text x="620" y="172" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#f85149">Data Loss</text>
  <text x="620" y="188" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#f85149">Secrets Leaked</text>

  <!-- Bottom warning -->
  <rect x="80" y="240" width="640" height="48" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="400" y="260" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#f85149" font-weight="500">No isolation boundary</text>
  <text x="400" y="278" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6e7681">Agent operates with full user permissions directly on the host machine</text>
</svg>
