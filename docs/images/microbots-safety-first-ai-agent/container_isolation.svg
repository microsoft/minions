<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <rect width="800" height="300" fill="#010409"/>
  <rect x="1" y="1" width="798" height="298" fill="none" stroke="#3d444d" stroke-width="1"/>

  <!-- Agent -->
  <rect x="40" y="110" width="120" height="55" rx="6" fill="#0d1117" stroke="#3d444d" stroke-width="1"/>
  <text x="100" y="134" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Microbots</text>
  <text x="100" y="152" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#6e7681">Agent</text>

  <!-- HTTP arrow -->
  <line x1="160" y1="137" x2="250" y2="137" stroke="#6e7681" stroke-width="1"/>
  <polygon points="248,132 258,137 248,142" fill="#6e7681"/>
  <text x="205" y="128" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">HTTP</text>

  <!-- Docker container -->
  <rect x="265" y="50" width="310" height="200" rx="8" fill="#0d1117" stroke="#3d444d" stroke-width="1.5"/>
  <text x="280" y="73" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e6edf3">Docker Container</text>

  <!-- Inner boxes -->
  <rect x="285" y="90" width="120" height="42" rx="5" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <text x="345" y="108" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#9ca3af">Shell Server</text>
  <text x="345" y="124" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">:8080</text>

  <rect x="420" y="90" width="120" height="42" rx="5" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <text x="480" y="108" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#9ca3af">/workspace</text>
  <text x="480" y="124" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">mounted files</text>

  <rect x="285" y="145" width="255" height="35" rx="5" fill="#151b23" stroke="#3d444d" stroke-width="1"/>
  <text x="412" y="167" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#9ca3af">grep · cscope · sed · python</text>

  <!-- Disposable -->
  <rect x="285" y="195" width="255" height="22" rx="11" fill="#151b23" stroke="#39d353" stroke-width="1"/>
  <text x="412" y="210" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#39d353">Disposable — destroyed after session</text>

  <!-- Blocked arrow -->
  <line x1="575" y1="137" x2="620" y2="137" stroke="#3d444d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="598" y="128" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="14" fill="#f85149">&#x2715;</text>

  <!-- Host -->
  <rect x="640" y="100" width="120" height="75" rx="6" fill="#0d1117" stroke="#39d353" stroke-width="1"/>
  <text x="700" y="130" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Host</text>
  <text x="700" y="148" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6e7681">Machine</text>
  <text x="700" y="167" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#39d353">Protected</text>

  <text x="400" y="285" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6e7681">Network boundary ensures the agent never touches the host directly</text>
</svg>
