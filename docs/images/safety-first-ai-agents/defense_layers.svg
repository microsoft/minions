<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="800" height="520" fill="url(#bg3)"/>
  <!-- Grid -->
  <g opacity="0.03" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/><line x1="0" y1="500" x2="800" y2="500"/>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#c7d2fe">Defense in Depth: 5 Layers of Protection</text>

  <!-- AI Agent on left -->
  <rect x="30" y="230" width="100" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="80" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#c7d2fe">AI Agent</text>
  <text x="80" y="275" text-anchor="middle" font-family="monospace" font-size="10" fill="#a5b4fc">command</text>
  <line x1="130" y1="260" x2="170" y2="260" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Layer 5: Iteration Budget (outermost, top) -->
  <rect x="175" y="55" width="590" height="420" rx="12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <rect x="185" y="60" width="200" height="28" rx="4" fill="#78350f" opacity="0.7"/>
  <circle cx="200" cy="74" r="9" fill="#f59e0b" opacity="0.8"/>
  <text x="199" y="78" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#78350f">5</text>
  <text x="218" y="79" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fcd34d">Iteration Budget</text>
  <!-- Budget bar -->
  <rect x="600" y="64" width="150" height="16" rx="3" fill="#292524"/>
  <rect x="600" y="64" width="90" height="16" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="675" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#fef3c7">30/50 used</text>

  <!-- Layer 4: Dangerous Command Detection -->
  <rect x="195" y="100" width="555" height="340" rx="12" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.7"/>
  <rect x="205" y="105" width="260" height="28" rx="4" fill="#450a0a" opacity="0.7"/>
  <circle cx="220" cy="119" r="9" fill="#ef4444" opacity="0.8"/>
  <text x="219" y="123" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#450a0a">4</text>
  <text x="240" y="124" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Dangerous Command Detection</text>
  <!-- Blocked commands -->
  <g transform="translate(540, 108)">
    <rect width="195" height="22" rx="3" fill="#292524" opacity="0.8"/>
    <text x="8" y="15" font-family="monospace" font-size="10" fill="#ef4444">✗ rm -rf /  </text>
    <text x="85" y="15" font-family="monospace" font-size="10" fill="#6b7280">→ blocked</text>
  </g>

  <!-- Layer 3: Permission Labels -->
  <rect x="215" y="148" width="520" height="270" rx="12" fill="none" stroke="#a855f7" stroke-width="2" opacity="0.7"/>
  <rect x="225" y="153" width="290" height="28" rx="4" fill="#3b0764" opacity="0.7"/>
  <circle cx="240" cy="167" r="9" fill="#a855f7" opacity="0.8"/>
  <text x="239" y="171" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#3b0764">3</text>
  <text x="260" y="172" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#d8b4fe">Permission Labels (READ_ONLY / READ_WRITE)</text>
  <!-- Permission badges -->
  <rect x="560" y="156" width="80" height="20" rx="10" fill="#166534" opacity="0.8"/>
  <text x="600" y="170" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#bbf7d0">READ_ONLY</text>
  <rect x="648" y="156" width="80" height="20" rx="10" fill="#1e3a5f" opacity="0.8"/>
  <text x="688" y="170" text-anchor="middle" font-family="monospace" font-size="9" font-weight="600" fill="#93c5fd">READ_WRITE</text>

  <!-- Layer 2: OverlayFS -->
  <rect x="235" y="195" width="485" height="200" rx="12" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7"/>
  <rect x="245" y="200" width="220" height="28" rx="4" fill="#083344" opacity="0.7"/>
  <circle cx="260" cy="214" r="9" fill="#22d3ee" opacity="0.8"/>
  <text x="259" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#083344">2</text>
  <text x="280" y="218" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#a5f3fc">OverlayFS (Copy-on-Write)</text>
  <!-- OverlayFS diagram -->
  <rect x="510" y="200" width="90" height="24" rx="4" fill="#164e63" opacity="0.6"/>
  <text x="555" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5f3fc">upper (rw)</text>
  <rect x="608" y="200" width="90" height="24" rx="4" fill="#164e63" opacity="0.6"/>
  <text x="653" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#a5f3fc">lower (ro)</text>

  <!-- Layer 1: Container Isolation (innermost) -->
  <rect x="255" y="242" width="450" height="133" rx="12" fill="#172554" stroke="#3b82f6" stroke-width="2.5" opacity="0.9"/>
  <rect x="265" y="247" width="210" height="28" rx="4" fill="#1e3a5f" opacity="0.9"/>
  <circle cx="280" cy="261" r="9" fill="#3b82f6" opacity="0.9"/>
  <text x="279" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e3a5f">1</text>
  <text x="300" y="266" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#93c5fd">Container Isolation (Docker)</text>

  <!-- Docker container contents -->
  <!-- Shell server -->
  <rect x="280" y="290" width="120" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="340" y="306" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Shell Server</text>
  <text x="340" y="322" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">HTTP API</text>

  <!-- Workspace -->
  <rect x="420" y="290" width="120" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="480" y="306" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">/workspace</text>
  <text x="480" y="322" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">mounted files</text>

  <!-- Tools -->
  <rect x="560" y="290" width="120" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="620" y="306" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">Tools</text>
  <text x="620" y="322" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">cscope, grep</text>

  <!-- Disposable label -->
  <rect x="280" y="345" width="400" height="20" rx="3" fill="none"/>
  <text x="480" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569" font-style="italic">Disposable container — destroyed after each session</text>

  <!-- Host safe indicator at bottom right -->
  <g transform="translate(660, 445)">
    <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac">✓ Host Safe</text>
  </g>

  <!-- Flow arrow labels -->
  <text x="400" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Commands pass through all 5 layers before reaching the isolated environment</text>
</svg>
