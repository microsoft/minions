<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgOF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bgOF)"/>
  <g opacity="0.03" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#a5f3fc">How OverlayFS Works in Microbots</text>

  <!-- Agent view (merged) at top -->
  <rect x="250" y="55" width="300" height="60" rx="10" fill="#164e63" stroke="#22d3ee" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a5f3fc">Agent's View (Merged)</text>
  <text x="400" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#67e8f9">reads + writes appear seamless</text>

  <!-- Arrow down -->
  <line x1="400" y1="115" x2="400" y2="140" stroke="#475569" stroke-width="1.5"/>
  <polygon points="394,138 400,148 406,138" fill="#475569"/>

  <!-- OverlayFS box -->
  <rect x="130" y="150" width="540" height="150" rx="12" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#67e8f9">OverlayFS</text>

  <!-- Upper layer (writable) -->
  <rect x="155" y="185" width="240" height="95" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="275" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#93c5fd">Upper Layer (Writable)</text>
  <rect x="175" y="222" width="85" height="22" rx="4" fill="#292524" stroke="#3b82f6" stroke-width="1"/>
  <text x="217" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">temp/</text>
  <rect x="270" y="222" width="105" height="22" rx="4" fill="#292524" stroke="#3b82f6" stroke-width="1"/>
  <text x="322" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">modified.py</text>
  <text x="275" y="267" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa">all writes go here ✏️</text>

  <!-- Lower layer (read-only) -->
  <rect x="415" y="185" width="240" height="95" rx="10" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="535" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#86efac">Lower Layer (Read-Only)</text>
  <rect x="435" y="222" width="65" height="22" rx="4" fill="#292524" stroke="#22c55e" stroke-width="1"/>
  <text x="467" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">src/</text>
  <rect x="510" y="222" width="65" height="22" rx="4" fill="#292524" stroke="#22c55e" stroke-width="1"/>
  <text x="542" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">.env</text>
  <rect x="585" y="222" width="55" height="22" rx="4" fill="#292524" stroke="#22c55e" stroke-width="1"/>
  <text x="612" y="237" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">*.py</text>
  <text x="535" y="267" text-anchor="middle" font-family="monospace" font-size="9" fill="#4ade80">your source code 🔒</text>

  <!-- Host safe banner -->
  <rect x="200" y="316" width="400" height="28" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
  <text x="400" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#86efac">✓ Host filesystem is never modified</text>
</svg>
