<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgPL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bgPL)"/>
  <g opacity="0.03" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
  </g>

  <!-- ReadingBot on left -->
  <rect x="50" y="50" width="150" height="100" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="125" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#c7d2fe">ReadingBot</text>
  <text x="125" y="100" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">code analysis</text>
  <!-- READ_ONLY badge -->
  <rect x="72" y="115" width="106" height="24" rx="12" fill="#166534" stroke="#22c55e" stroke-width="1.5"/>
  <text x="125" y="132" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#bbf7d0">READ_ONLY</text>

  <!-- Arrow to mount -->
  <line x1="200" y1="100" x2="290" y2="100" stroke="#22c55e" stroke-width="2"/>
  <polygon points="288,94 298,100 288,106" fill="#22c55e"/>

  <!-- Mount: read-only -->
  <rect x="300" y="55" width="180" height="90" rx="10" fill="#052e16" stroke="#22c55e" stroke-width="2"/>
  <text x="390" y="82" text-anchor="middle" font-family="monospace" font-size="12" fill="#86efac">/workspace/src</text>
  <text x="390" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#4ade80">🔒 OS-level read-only</text>
  <text x="390" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#166534">write → Permission denied</text>

  <!-- WritingBot on left -->
  <rect x="50" y="200" width="150" height="100" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="125" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#c7d2fe">WritingBot</text>
  <text x="125" y="250" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc">code edits</text>
  <!-- READ_WRITE badge -->
  <rect x="72" y="265" width="106" height="24" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="125" y="282" text-anchor="middle" font-family="monospace" font-size="10" font-weight="700" fill="#93c5fd">READ_WRITE</text>

  <!-- Arrow to mount -->
  <line x1="200" y1="250" x2="290" y2="250" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="288,244 298,250 288,256" fill="#3b82f6"/>

  <!-- Mount: read-write -->
  <rect x="300" y="205" width="180" height="90" rx="10" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="232" text-anchor="middle" font-family="monospace" font-size="12" fill="#93c5fd">/workspace/src</text>
  <text x="390" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#60a5fa">✏️ OS-level read-write</text>
  <text x="390" y="280" text-anchor="middle" font-family="monospace" font-size="9" fill="#1e3a5f">write → allowed</text>

  <!-- VS comparison box on right -->
  <rect x="530" y="80" width="240" height="180" rx="12" fill="#1e1b4b" stroke="#475569" stroke-width="1.5"/>
  <text x="650" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e0e7ff">Infrastructure Safety</text>
  <text x="650" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a5b4fc">vs</text>
  <text x="650" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5">Prompt-Level Safety</text>
  <line x1="555" y1="168" x2="745" y2="168" stroke="#475569" stroke-width="1"/>
  <text x="650" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#86efac">✓ OS permissions survive</text>
  <text x="650" y="212" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#86efac">  prompt injection attacks</text>
  <text x="650" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#fca5a5">✗ "Please don't write" does not</text>

  <!-- Bottom label -->
  <text x="400" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Permissions enforced at the filesystem level, not the prompt level</text>
</svg>
