<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bgCI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arrCI" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
    <marker id="arrHTTP" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="800" height="350" fill="url(#bgCI)"/>
  <g opacity="0.03" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
  </g>

  <!-- Agent on left -->
  <rect x="40" y="110" width="130" height="70" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="105" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#c7d2fe">Microbots</text>
  <text x="105" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Agent</text>

  <!-- Arrow: Agent → Shell Server (HTTP) -->
  <line x1="170" y1="145" x2="260" y2="145" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrHTTP)"/>
  <text x="215" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="#67e8f9">HTTP</text>

  <!-- Docker container -->
  <rect x="270" y="50" width="340" height="240" rx="14" fill="#172554" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Docker label -->
  <rect x="285" y="60" width="140" height="26" rx="5" fill="#1e3a5f"/>
  <text x="296" y="78" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">🐳 Docker Container</text>

  <!-- Shell Server inside -->
  <rect x="300" y="105" width="130" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="365" y="128" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">Shell Server</text>
  <text x="365" y="147" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">:8080</text>

  <!-- Workspace inside -->
  <rect x="455" y="105" width="130" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="520" y="128" text-anchor="middle" font-family="monospace" font-size="12" fill="#94a3b8">/workspace</text>
  <text x="520" y="147" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">mounted files</text>

  <!-- Tools inside -->
  <rect x="300" y="180" width="285" height="45" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="442" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">Tools: grep, cscope, sed, python</text>
  <text x="442" y="216" text-anchor="middle" font-family="monospace" font-size="9" fill="#64748b">all execution sandboxed inside container</text>

  <!-- Disposable label -->
  <rect x="295" y="245" width="300" height="28" rx="14" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
  <text x="445" y="264" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#86efac">♻ Disposable — destroyed after session</text>

  <!-- Host on right, protected -->
  <rect x="650" y="95" width="120" height="100" rx="10" fill="#1e1b4b" stroke="#22c55e" stroke-width="2"/>
  <text x="710" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#86efac">Host</text>
  <text x="710" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#86efac">Machine</text>
  <text x="710" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#22c55e">🛡️</text>

  <!-- Blocked arrow from container to host -->
  <line x1="610" y1="145" x2="640" y2="145" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="625" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ef4444">✗</text>

  <!-- Bottom label -->
  <text x="400" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Network boundary ensures agent never touches the host directly</text>
</svg>
